<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无用但爽 ✨</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* 背景粒子 */
    #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: rgba(255,255,255,0.4);
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 700px;
      width: 100%;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2rem;
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
      display: block;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.25);
    }

    .card-emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }

    .card.cleaner { border-color: rgba(167,139,250,0.3); }
    .card.cleaner:hover { border-color: rgba(167,139,250,0.6); box-shadow: 0 0 30px rgba(167,139,250,0.15); }

    .card.bubble { border-color: rgba(56,189,248,0.3); }
    .card.bubble:hover { border-color: rgba(56,189,248,0.6); box-shadow: 0 0 30px rgba(56,189,248,0.15); }

    .card.tone { border-color: rgba(251,191,36,0.3); }
    .card.tone:hover { border-color: rgba(251,191,36,0.6); box-shadow: 0 0 30px rgba(251,191,36,0.15); }

    .card.glass { border-color: rgba(125,211,252,0.3); }
    .card.glass:hover { border-color: rgba(125,211,252,0.6); box-shadow: 0 0 30px rgba(125,211,252,0.15); }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="content">
    <h1>无用但爽 ✨</h1>
    <p class="subtitle">没什么用，但停不下来</p>

    <div class="grid">
      <a href="screen-cleaner.html" class="card cleaner">
        <span class="card-emoji">🧽</span>
        <div class="card-title">屏幕清洁器</div>
        <div class="card-desc">擦去所有污渍，还原完美屏幕。强迫症的终极治愈。</div>
      </a>
      <a href="bubble-pop.html" class="card bubble">
        <span class="card-emoji">🫧</span>
        <div class="card-title">消除泡泡</div>
        <div class="card-desc">点击泡泡，享受消除的快感。连击触发 FEVER 模式。</div>
      </a>
      <a href="tone-map.html" class="card tone">
        <span class="card-emoji">🎵</span>
        <div class="card-title">音调地图</div>
        <div class="card-desc">鼠标游走即成旋律。X轴控音高，Y轴控音色，Shift 奏和弦。</div>
      </a>
      <a href="broken-glass.html" class="card glass">
        <span class="card-emoji">🪟</span>
        <div class="card-title">碎玻璃</div>
        <div class="card-desc">点击屏幕，玻璃从中心炸裂。20次后整体崩塌，哗啦啦掉落。</div>
      </a>
    </div>
  </div>

  <p class="footer">更多玩法即将到来</p>

  <script>
    // 背景漂浮粒子
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 60; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.5 + 0.5,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        alpha: Math.random() * 0.4 + 0.1
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
